{% extends 'base.html' %}
{% block title %}{{ title }} — RescueHub{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-4 p-md-5">
        <h5 class="fw-800 mb-4">{{ title }}</h5>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label">Nome</label><input name="name" class="form-control" value="{{ animal.name|default:'' }}" required></div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Espécie</label>
              <select name="species" class="form-control" required>
                <option value="cao" {% if animal.species == 'cao' %}selected{% endif %}>Cão</option>
                <option value="gato" {% if animal.species == 'gato' %}selected{% endif %}>Gato</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Sexo</label>
              <select name="sex" class="form-control" required>
                <option value="macho" {% if animal.sex == 'macho' %}selected{% endif %}>Macho</option>
                <option value="femea" {% if animal.sex == 'femea' %}selected{% endif %}>Fêmea</option>
              </select>
            </div>
            <div class="col-md-6 mb-3"><label class="form-label">Idade (anos)</label><input name="age" type="number" class="form-control" value="{{ animal.age|default:'' }}" required></div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Porte</label>
              <select name="size" class="form-control" required>
                <option value="pequeno" {% if animal.size == 'pequeno' %}selected{% endif %}>Pequeno</option>
                <option value="medio" {% if animal.size == 'medio' %}selected{% endif %}>Médio</option>
                <option value="grande" {% if animal.size == 'grande' %}selected{% endif %}>Grande</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Status</label>
              <select name="status" class="form-control">
                <option value="disponivel" {% if animal.status == 'disponivel' %}selected{% endif %}>Disponível</option>
                <option value="em_processo" {% if animal.status == 'em_processo' %}selected{% endif %}>Em Processo</option>
                <option value="adotado" {% if animal.status == 'adotado' %}selected{% endif %}>Adotado</option>
              </select>
            </div>
            <div class="col-12 mb-3"><label class="form-label">Temperamento</label><input name="temperament" class="form-control" value="{{ animal.temperament|default:'' }}" placeholder="Ex: dócil, brincalhão, tímido"></div>
            <div class="col-12 mb-3"><label class="form-label">Descrição</label><textarea name="description" class="form-control" rows="3" required>{{ animal.description|default:'' }}</textarea></div>
            <div class="col-12 mb-3"><label class="form-label">Histórico de Saúde</label><textarea name="health_history" class="form-control" rows="3">{{ animal.health_history|default:'' }}</textarea></div>
            <div class="col-12 mb-3"><label class="form-label">Foto</label><input name="photo" type="file" class="form-control" accept="image/*"></div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary-custom">Salvar</button>
            <a href="/catalogo/" class="btn btn-outline-secondary" style="border-radius:10px;">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

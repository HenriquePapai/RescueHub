{% extends 'base.html' %}
{% block title %}Entrar — RescueHub{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="container">
    <div class="auth-card mx-auto">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🐾</div>
        <h4 class="fw-800 mt-2">Bem-vindo de volta!</h4>
      </div>
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Nome de usuário</label>
          <input name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input name="password" type="password" class="form-control" required>
        </div>
        <button class="btn btn-primary-custom w-100 py-2">Entrar</button>
      </form>
      <p class="text-center text-muted small mt-4 mb-0">Não tem conta? <a href="/register/" class="fw-bold" style="color:var(--primary)">Cadastre-se</a></p>
    </div>
  </div>
</div>
{% endblock %}

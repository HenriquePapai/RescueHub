{% extends 'base.html' %}
{% block title %}Cadastro — RescueHub{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4 p-md-5">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem;">🐾</div>
          <h4 class="fw-800 mt-2">Criar Conta</h4>
        </div>
        {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
        <form method="post">
          {% csrf_token %}
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Nome</label>
              <input name="first_name" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Sobrenome</label>
              <input name="last_name" class="form-control">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Nome de usuário</label>
            <input name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input name="email" type="email" class="form-control">
          </div>
          <div class="mb-4">
            <label class="form-label">Senha</label>
            <input name="password" type="password" class="form-control" required>
            <div class="form-text">Mínimo 12 caracteres.</div>
          </div>
          <button class="btn btn-primary-custom w-100 py-2">Criar Conta</button>
        </form>
        <p class="text-center text-muted small mt-4 mb-0">Já tem conta? <a href="/login/" class="fw-bold" style="color:var(--primary)">Entrar</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

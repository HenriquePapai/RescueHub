---
# ConfigMap com a configuração do Nginx atuando como API Gateway
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: rescuehub
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {
      worker_connections 1024;
    }

    http {
      # Logging para auditoria
      log_format main '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';
      access_log /var/log/nginx/access.log main;
      error_log  /var/log/nginx/error.log warn;

      # Oculta versão do servidor (segurança)
      server_tokens off;

      # Rate limiting — mitiga força bruta e DDoS (modelo de ameaças)
      limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

      upstream rescuehub_backend {
        server rescuehub-web.rescuehub.svc.cluster.local:80;
        keepalive 32;
      }

      server {
        listen 8080;
        server_name _;

        # Cabeçalhos de segurança
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

        # Aplica rate limiting em todas as rotas
        limit_req zone=api_limit burst=10 nodelay;

        # Rota principal — proxy para o serviço Django
        location / {
          proxy_pass         http://rescuehub_backend;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_read_timeout 60s;
          proxy_connect_timeout 10s;
        }

        # Bloqueia acesso direto ao admin de IPs externos (proteção adicional)
        location /admin/ {
          # Permite apenas loopback e rede interna do cluster
          allow 10.0.0.0/8;
          allow 127.0.0.1;
          deny all;
          proxy_pass http://rescuehub_backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check do gateway
        location /healthz {
          access_log off;
          return 200 "ok\n";
          add_header Content-Type text/plain;
        }
      }
    }

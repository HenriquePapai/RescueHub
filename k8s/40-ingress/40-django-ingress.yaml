apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rescuehub-ingress
  namespace: rescuehub
  labels:
    app.kubernetes.io/name: rescuehub-ingress
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: rescuehub
  annotations:
    # Importante para upload de PDFs/documentos pelo formulário de adoção.
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: rescuehub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rescuehub-web
                port:
                  number: 8000

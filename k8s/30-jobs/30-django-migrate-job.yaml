apiVersion: batch/v1
kind: Job
metadata:
  name: django-migrate
  namespace: rescuehub
  labels:
    app.kubernetes.io/name: django-migrate
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: rescuehub
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: django-migrate
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: rescuehub
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: rescuehub-web:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - |
              python - <<'PY'
              import os
              import time
              import psycopg2

              dbname = os.environ["DATABASE_NAME"]
              user = os.environ["DATABASE_USER"]
              password = os.environ["DATABASE_PASSWORD"]
              host = os.environ["DATABASE_HOST"]
              port = os.environ.get("DATABASE_PORT", "5432")

              for attempt in range(1, 31):
                  try:
                      conn = psycopg2.connect(
                          dbname=dbname,
                          user=user,
                          password=password,
                          host=host,
                          port=port,
                          connect_timeout=3,
                      )
                      conn.close()
                      print("Postgres disponível.")
                      break
                  except Exception as exc:
                      print(f"Aguardando Postgres... tentativa {attempt}/30: {exc}")
                      time.sleep(2)
              else:
                  raise SystemExit("Postgres não ficou disponível a tempo.")
              PY
              python app/manage.py migrate --noinput
          envFrom:
            - configMapRef:
                name: rescuehub-config
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rescuehub-secret
                  key: DJANGO_SECRET_KEY
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rescuehub-secret
                  key: DATABASE_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

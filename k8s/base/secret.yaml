apiVersion: v1
kind: Secret
metadata:
  name: rescuehub-secret
  namespace: rescuehub
type: Opaque
# Valores em base64. Para gerar: echo -n "valor" | base64
# Estes são os valores de exemplo — substitua pelos reais no cluster
stringData:
  DATABASE_NAME: rescuehub
  DATABASE_USER: rescuehub
  DATABASE_PASSWORD: rescuehub_prod_pass
  DJANGO_SECRET_KEY: "troque-por-uma-chave-forte-de-50-chars-no-minimo"
  POSTGRES_DB: rescuehub
  POSTGRES_USER: rescuehub
  POSTGRES_PASSWORD: rescuehub_prod_pass

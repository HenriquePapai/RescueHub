apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: rescuehub
  labels:
    app.kubernetes.io/name: api-gateway-config
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: rescuehub
data:
  GATEWAY_DEBUG: "1"
  GATEWAY_ALLOWED_HOSTS: "localhost,127.0.0.1,.app.github.dev,rescuehub.local"
  BACKEND_BASE_URL: "http://rescuehub-web:8000"
  GATEWAY_TIMEOUT_SECONDS: "30"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rescuehub
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: rescuehub
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: rescuehub
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: rescuehub-gateway:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - python gateway/manage.py runserver 0.0.0.0:8000
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: GATEWAY_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rescuehub-secret
                  key: GATEWAY_SECRET_KEY
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

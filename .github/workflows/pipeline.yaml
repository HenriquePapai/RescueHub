name: "Projeto"

on:
  - push
  - workflow_dispatch

jobs:
  bandit:
    name: Bandit - SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup-Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Bandit
        run: pip install bandit
      - name: Execucao Bandit
        run: bandit -r .
  
  snyk-sast:
    name: Snyk - SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup-Snyk
        uses: snyk/actions/setup@master
      - name: Snyk-Scan
        run: snyk code test --org=${{ secrets.SNYK_ORG }} -d
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  snyk-sca:
    name: Snyk - SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup-Snyk
        uses: snyk/actions/python@0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=requirements.txt --org=${{ secrets.SNYK_ORG }}

  delivery:
    name: Build-Push
    needs: [bandit, snyk-sast, snyk-sca]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Envio para o Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rescue-hub:latest
      - name: Logout
        run: docker logout

  backup:
    name: Backup - PostgreSQL
    needs: [delivery]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar cliente PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Subir banco de dados via Docker Compose
        run: |
          docker compose up -d db
          echo "Aguardando PostgreSQL ficar pronto..."
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U ${{ secrets.DATABASE_USER }} && break
            sleep 2
          done

      - name: Executar backup
        id: run_backup
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
        run: |
          chmod +x scripts/backup_db.sh
          bash scripts/backup_db.sh

      - name: Upload do backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: rescuehub-db-backup-${{ github.run_number }}
          path: backups/
          retention-days: 30

      - name: Parar containers
        if: always()
        run: docker compose down

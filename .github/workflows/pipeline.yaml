name: "Projeto"

on:
  - push
  - workflow_dispatch

jobs:
  bandit:
    name: Bandit - SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup-Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Bandit
        run: pip install bandit
      - name: Execucao Bandit
        run: bandit -r .

  snyk-sast:
    name: Snyk - SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup-Snyk
        uses: snyk/actions/setup@master
      - name: Snyk-Scan
        run: snyk code test --org=${{ secrets.SNYK_ORG }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  snyk-sca:
    name: Snyk - SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup-Snyk
        uses: snyk/actions/python@0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=requirements.txt --org=${{ secrets.SNYK_ORG }}

  # ── CD: Build & Push imagem Docker
  delivery:
    name: Build-Push
    needs: [bandit, snyk-sast, snyk-sca]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Envio para o Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rescue-hub:latest
      - name: Logout
        run: docker logout

  # ── CD: Deploy contínuo no Kubernetes
  deploy:
    name: Deploy - Kubernetes
    needs: [delivery]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Criar cluster Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: rescuehub

      - name: Atualizar referência da imagem
        run: |
          sed -i "s|image: rescue-hub:local|image: ${{ secrets.DOCKER_USERNAME }}/rescue-hub:latest|g" k8s/base/web.yaml
          sed -i "s|imagePullPolicy: Never|imagePullPolicy: Always|g" k8s/base/web.yaml

      - name: Criar namespace
        run: kubectl apply -f k8s/base/namespace.yaml

      - name: Criar Secret
        run: |
          kubectl create secret generic rescuehub-secret \
            --namespace=rescuehub \
            --from-literal=DATABASE_NAME=${{ secrets.DATABASE_NAME }} \
            --from-literal=DATABASE_USER=${{ secrets.DATABASE_USER }} \
            --from-literal=DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} \
            --from-literal=DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} \
            --from-literal=POSTGRES_DB=${{ secrets.DATABASE_NAME }} \
            --from-literal=POSTGRES_USER=${{ secrets.DATABASE_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.DATABASE_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Aplicar banco de dados
        run: kubectl apply -f k8s/base/db.yaml

      - name: Aplicar aplicação web
        run: kubectl apply -f k8s/base/web.yaml

      - name: Aplicar API Gateway
        run: |
          kubectl apply -f k8s/gateway/configmap.yaml
          kubectl apply -f k8s/gateway/gateway.yaml

      - name: Status final do cluster
        run: |
          echo "=== Pods ==="
          kubectl get pods -n rescuehub
          echo "=== Services ==="
          kubectl get svc -n rescuehub

  # ── Backup do banco
  backup:
    name: Backup - PostgreSQL
    needs: [delivery]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar cliente PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Subir banco de dados via Docker Compose
        run: |
          docker compose up -d db
          echo "Aguardando PostgreSQL ficar pronto..."
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U ${{ secrets.DATABASE_USER }} && break
            sleep 2
          done

      - name: Executar backup
        id: run_backup
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
        run: |
          chmod +x scripts/backup_db.sh
          bash scripts/backup_db.sh

      - name: Upload do backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: rescuehub-db-backup-${{ github.run_number }}
          path: backups/
          retention-days: 30

      - name: Parar containers
        if: always()
        run: docker compose down
